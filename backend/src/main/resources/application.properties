# Server
server.port=8080
spring.main.banner-mode=off
spring.jmx.enabled=false
logging.level.org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLogger=OFF

# Database
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=QuanLyThuVien;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.validation-timeout=3000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# Timezone
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# JWT Security
app.security.jwt-secret=library-desktop-app-secret-key-change-this-later
app.security.jwt-expiration-minutes=480
